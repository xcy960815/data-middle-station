# 本 compose 适用于容器内服务互通的部署场景，Redis 与 MySQL 仅在 Docker 网络内部访问
services:
  # Nuxt3 应用服务
  nuxt3:
    image: xcy960815/data-middle-station:${IMAGE_VERSION:-latest}
    container_name: dms-app-container
    ports:
      - '${NUXT_PORT}:12583'
    volumes:
      - /mnt/sata1-4/AppData/dms/logs:/app/logs
    environment:
      NUXT_SERVICE_DB_HOST: mysql-main
      NUXT_SERVICE_DB_PORT: 3306
      NUXT_SERVICE_DB_USER: root
      NUXT_SERVICE_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      NUXT_SERVICE_DB_NAME: ${MYSQL_DATABASE}
      NUXT_SERVICE_DB_TIMEZONE: +08:00
      NUXT_SERVICE_DB_DATE_STRINGS: 'true'
      NUXT_SERVICE_DB_DECIMAL_NUMBERS: 'true'
      NUXT_SERVICE_DATA_DB_HOST: mysql-data
      NUXT_SERVICE_DATA_DB_PORT: 3306
      NUXT_SERVICE_DATA_DB_USER: root
      NUXT_SERVICE_DATA_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      NUXT_SERVICE_DATA_DB_NAME: ${MYSQL_DATA_DATABASE}
      NUXT_SERVICE_DATA_DB_TIMEZONE: +08:00
      NUXT_SERVICE_DATA_DB_DATE_STRINGS: 'true'
      NUXT_SERVICE_DATA_DB_DECIMAL_NUMBERS: 'true'
      NUXT_SERVICE_REDIS_HOST: redis
      NUXT_SERVICE_REDIS_PORT: 6379
      NUXT_SERVICE_REDIS_USERNAME: default
      NUXT_SERVICE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NUXT_SERVICE_REDIS_DB: '0'
      NUXT_SERVICE_REDIS_BASE: dms-redis
      NUXT_DEEP_SEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NUXT_DEEP_SEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/chat/completions}
      NUXT_DEEP_SEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
    restart: always
    networks:
      - dms-network
    depends_on:
      mysql-main:
        condition: service_healthy
      mysql-data:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Redis 缓存服务
  redis:
    image: redis:7.2.5
    container_name: dms-redis-container
    command: ["redis-server", "--bind", "0.0.0.0", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - /mnt/sata1-4/AppData/dms/redis/data:/data
    networks:
      - dms-network
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # 主数据库 MySQL（应用数据）
  mysql-main:
    image: mysql:8.4.2
    container_name: dms-mysql-main-container
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - TZ=Asia/Shanghai
    command:
      [
        '--bind-address=0.0.0.0',
        '--character-set-server=utf8mb4',
        '--collation-server=utf8mb4_unicode_ci',
        '--max_allowed_packet=128M',
        '--sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION',
        '--default-time-zone=+8:00',
      ]
    volumes:
      - /mnt/sata1-4/AppData/dms/mysql-main/data:/var/lib/mysql
    networks:
      - dms-network
    restart: always
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      timeout: 20s
      retries: 10
      interval: 5s
      start_period: 30s

  # 看板数据 MySQL（业务数据）
  mysql-data:
    image: mysql:8.4.2
    container_name: dms-mysql-data-container
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATA_DATABASE}
      - TZ=Asia/Shanghai
    command:
      [
        '--bind-address=0.0.0.0',
        '--character-set-server=utf8mb4',
        '--collation-server=utf8mb4_unicode_ci',
        '--max_allowed_packet=128M',
        '--sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION',
        '--default-time-zone=+8:00',
      ]
    volumes:
      - /mnt/sata1-4/AppData/dms/mysql-data/data:/var/lib/mysql
    networks:
      - dms-network
    restart: always
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      timeout: 20s
      retries: 10
      interval: 5s
      start_period: 30s

networks:
  dms-network:
    name: dms-network
    driver: bridge
